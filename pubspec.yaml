name: petfinder
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_native_splash: 2.4.7
  flutter_bloc: 8.1.3
  dio: 5.4.1
  get_it: 7.6.7
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.2
  firebase_analytics: ^11.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.3.2
  bloc_test: ^9.1.0
  flutter_lints: ^5.0.0
  hive_generator: 2.0.1
  build_runner: 2.3.3

dependency_overrides:
  analyzer: "6.4.1"
  source_gen: "1.5.0"

flutter:
  uses-material-design: true
  assets:
    - assets/images/pets.png
    - .env


flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: assets/images/logo_12.png